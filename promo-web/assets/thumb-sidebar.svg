<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#0e1f1a"/>
  <!-- Sidebar mockup -->
  <rect x="80" y="40" width="240" height="320" rx="14" fill="#111f1b" stroke="#1e3c34"/>
  <text x="108" y="76" font-family="sans-serif" font-size="11" font-weight="600" fill="#7a9990" letter-spacing="0.12em">ROOMS</text>
  <!-- Room 1 active -->
  <rect x="94" y="90" width="212" height="44" rx="8" fill="#4a90e2" opacity="0.12"/>
  <rect x="94" y="90" width="3" height="44" rx="1.5" fill="#4a90e2"/>
  <text x="144" y="117" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">🎮 Gaming</text>
  <!-- Drag handle -->
  <g fill="#5c7a71" opacity="0.4"><circle cx="114" cy="108" r="1.5"/><circle cx="114" cy="114" r="1.5"/><circle cx="120" cy="108" r="1.5"/><circle cx="120" cy="114" r="1.5"/></g>
  <!-- Room 2 -->
  <rect x="94" y="142" width="212" height="44" rx="8" fill="transparent"/>
  <text x="144" y="169" font-family="sans-serif" font-size="13" fill="#5c7a71">💼 Work</text>
  <g fill="#5c7a71" opacity="0.3"><circle cx="114" cy="160" r="1.5"/><circle cx="114" cy="166" r="1.5"/><circle cx="120" cy="160" r="1.5"/><circle cx="120" cy="166" r="1.5"/></g>
  <!-- Room 3 being dragged -->
  <g opacity="0.3"><rect x="94" y="194" width="212" height="44" rx="8" fill="transparent" stroke="#1e3c34" stroke-dasharray="4 3"/></g>
  <g transform="translate(4, -20)">
    <rect x="94" y="194" width="212" height="44" rx="8" fill="#111f1b" stroke="#4a90e2" stroke-width="1" opacity="0.9"/>
    <text x="144" y="221" font-family="sans-serif" font-size="13" fill="#e0ebe7">🎙 Podcast</text>
    <g fill="#4a90e2" opacity="0.6"><circle cx="114" cy="212" r="1.5"/><circle cx="114" cy="218" r="1.5"/><circle cx="120" cy="212" r="1.5"/><circle cx="120" cy="218" r="1.5"/></g>
  </g>
  <!-- Room 4 -->
  <rect x="94" y="246" width="212" height="44" rx="8" fill="transparent"/>
  <text x="144" y="273" font-family="sans-serif" font-size="13" fill="#5c7a71">🎵 Music</text>
  <!-- Bottom bar -->
  <rect x="80" y="310" width="240" height="50" rx="0 0 14 14" fill="#4a90e2" opacity="0.06"/>
  <rect x="80" y="310" width="240" height="1" fill="#1e3c34" opacity="0.3"/>
  <text x="108" y="340" font-family="sans-serif" font-size="11" font-weight="500" fill="#4a90e2">+ New Room</text>
</svg>
