<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#0e1f1a"/>
  <!-- Panel mockup -->
  <rect x="40" y="160" width="320" height="40" rx="0" fill="#111f1b"/>
  <rect x="40" y="200" width="320" height="1" fill="#1e3c34"/>
  <!-- System tray icons -->
  <g font-family="sans-serif" font-size="14" fill="#5c7a71">
    <text x="68" y="185">🔋</text><text x="100" y="185">📶</text><text x="132" y="185">🔊</text>
  </g>
  <!-- SoundRoot icon (highlighted) -->
  <rect x="160" y="166" width="28" height="28" rx="6" fill="#4a90e2" opacity="0.15" stroke="#4a90e2" stroke-width="1"/>
  <text x="166" y="186" font-family="sans-serif" font-size="14">🎛</text>
  <!-- Active status dot -->
  <circle cx="184" cy="170" r="4" fill="#50c878"/>
  <circle cx="184" cy="170" r="6" fill="#50c878" opacity="0.3"/>
  <!-- Clock -->
  <text x="310" y="185" font-family="monospace" font-size="12" fill="#7a9990">14:32</text>
  <!-- Label -->
  <text x="200" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#5c7a71" letter-spacing="0.1em">PANEL INTEGRATION</text>
</svg>
