<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1f1a"/>
      <stop offset="100%" stop-color="#0a1714"/>
    </linearGradient>
    <linearGradient id="wire1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wire2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50c878" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#50c878" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wire3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e27450" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e27450" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="920" height="620" rx="0" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#fff"/>
    </pattern>
    <rect width="920" height="620" fill="url(#dots)"/>
  </g>
  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="620" fill="#111f1b" opacity="0.8"/>
  <rect x="200" y="0" width="1" height="620" fill="#1e3c34" opacity="0.5"/>
  <!-- Sidebar header -->
  <text x="24" y="40" font-family="sans-serif" font-size="13" font-weight="600" fill="#b3c8c0" letter-spacing="0.1em">ROOMS</text>
  <!-- Room items -->
  <rect x="12" y="56" width="176" height="42" rx="8" fill="#4a90e2" opacity="0.15"/>
  <rect x="12" y="56" width="3" height="42" rx="1.5" fill="#4a90e2"/>
  <circle cx="32" cy="77" r="6" fill="#4a90e2" opacity="0.5"/>
  <text x="46" y="81" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Gaming</text>
  <rect x="12" y="106" width="176" height="42" rx="8" fill="transparent"/>
  <circle cx="32" cy="127" r="6" fill="#50c878" opacity="0.4"/>
  <text x="46" y="131" font-family="sans-serif" font-size="13" fill="#7a9990">Work</text>
  <rect x="12" y="156" width="176" height="42" rx="8" fill="transparent"/>
  <circle cx="32" cy="177" r="6" fill="#e27450" opacity="0.4"/>
  <text x="46" y="181" font-family="sans-serif" font-size="13" fill="#7a9990">Podcast</text>
  <!-- Bottom bar -->
  <rect x="0" y="574" width="200" height="46" fill="#4a90e2" opacity="0.08"/>
  <rect x="0" y="574" width="200" height="1" fill="#1e3c34" opacity="0.3"/>
  <text x="24" y="602" font-family="sans-serif" font-size="12" font-weight="500" fill="#4a90e2">+ New Room</text>
  <circle cx="176" cy="597" r="10" fill="#1e3c34" opacity="0.5"/>
  <text x="172" y="601" font-family="sans-serif" font-size="11" fill="#7a9990">⚙</text>
  <!-- Main area: source nodes -->
  <g>
    <!-- Firefox -->
    <rect x="240" y="100" width="180" height="64" rx="12" fill="#111f1b" stroke="#1e3c34" stroke-width="1"/>
    <circle cx="268" cy="132" r="14" fill="#e27450" opacity="0.2"/>
    <text x="264" y="136" font-family="sans-serif" font-size="12" fill="#e27450">🦊</text>
    <text x="290" y="128" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Firefox</text>
    <text x="290" y="146" font-family="sans-serif" font-size="10" fill="#5c7a71">YouTube Music</text>
    <circle cx="408" cy="132" r="6" fill="#4a90e2" opacity="0.6"/>
    <!-- Discord -->
    <rect x="240" y="200" width="180" height="64" rx="12" fill="#111f1b" stroke="#1e3c34" stroke-width="1"/>
    <circle cx="268" cy="232" r="14" fill="#7289da" opacity="0.2"/>
    <text x="260" y="236" font-family="sans-serif" font-size="14" fill="#7289da">💬</text>
    <text x="290" y="228" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Discord</text>
    <text x="290" y="246" font-family="sans-serif" font-size="10" fill="#5c7a71">Voice Chat</text>
    <circle cx="408" cy="232" r="6" fill="#50c878" opacity="0.6"/>
    <!-- Game -->
    <rect x="240" y="300" width="180" height="64" rx="12" fill="#111f1b" stroke="#1e3c34" stroke-width="1"/>
    <circle cx="268" cy="332" r="14" fill="#4a90e2" opacity="0.2"/>
    <text x="261" y="337" font-family="sans-serif" font-size="14" fill="#4a90e2">🎮</text>
    <text x="290" y="328" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Steam Game</text>
    <text x="290" y="346" font-family="sans-serif" font-size="10" fill="#5c7a71">Game Audio</text>
    <circle cx="408" cy="332" r="6" fill="#4a90e2" opacity="0.6"/>
  </g>
  <!-- Sink nodes -->
  <g>
    <!-- Headphones -->
    <rect x="640" y="140" width="220" height="64" rx="12" fill="#111f1b" stroke="#1e3c34" stroke-width="1"/>
    <circle cx="668" cy="172" r="14" fill="#4a90e2" opacity="0.15"/>
    <text x="661" y="177" font-family="sans-serif" font-size="14" fill="#4a90e2">🎧</text>
    <text x="690" y="168" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Headphones</text>
    <text x="690" y="186" font-family="sans-serif" font-size="10" fill="#5c7a71">USB Audio DAC</text>
    <circle cx="652" cy="172" r="6" fill="#4a90e2" opacity="0.6"/>
    <!-- Speakers -->
    <rect x="640" y="280" width="220" height="64" rx="12" fill="#111f1b" stroke="#1e3c34" stroke-width="1"/>
    <circle cx="668" cy="312" r="14" fill="#50c878" opacity="0.15"/>
    <text x="661" y="317" font-family="sans-serif" font-size="14" fill="#50c878">🔊</text>
    <text x="690" y="308" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">Speakers</text>
    <text x="690" y="326" font-family="sans-serif" font-size="10" fill="#5c7a71">Built-in Audio</text>
    <circle cx="652" cy="312" r="6" fill="#50c878" opacity="0.6"/>
  </g>
  <!-- Connection wires (bezier curves) -->
  <path d="M414 132 C520 132 540 172 646 172" stroke="url(#wire1)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M414 232 C520 232 540 312 646 312" stroke="url(#wire2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M414 332 C520 332 540 172 646 172" stroke="url(#wire1)" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- Status bar -->
  <rect x="200" y="580" width="720" height="40" fill="#0e1f1a"/>
  <rect x="200" y="580" width="720" height="1" fill="#1e3c34" opacity="0.3"/>
  <circle cx="222" cy="600" r="4" fill="#50c878"/>
  <text x="234" y="604" font-family="monospace" font-size="11" fill="#5c7a71">3 streams · 2 sinks · Gaming room active</text>
  <!-- Labels -->
  <text x="300" y="80" font-family="sans-serif" font-size="11" font-weight="500" fill="#5c7a71" letter-spacing="0.15em">SOURCES</text>
  <text x="720" y="120" font-family="sans-serif" font-size="11" font-weight="500" fill="#5c7a71" letter-spacing="0.15em">OUTPUTS</text>
</svg>
