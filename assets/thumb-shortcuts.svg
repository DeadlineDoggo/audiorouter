<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#0e1f1a"/>
  <!-- Shortcuts config panel -->
  <rect x="50" y="50" width="300" height="300" rx="14" fill="#111f1b" stroke="#1e3c34"/>
  <text x="200" y="88" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#e0ebe7">Keyboard Shortcuts</text>
  <rect x="50" y="100" width="300" height="1" fill="#1e3c34"/>
  <!-- Shortcut rows -->
  <g font-family="sans-serif" font-size="12">
    <!-- Row 1 -->
    <text x="74" y="134" fill="#e0ebe7">Open SoundRoot</text>
    <rect x="228" y="118" width="100" height="26" rx="6" fill="#0e1f1a" stroke="#1e3c34"/>
    <text x="244" y="136" font-family="monospace" font-size="10" fill="#4a90e2">Meta+S</text>
    <rect x="50" y="150" width="300" height="1" fill="#1e3c34" opacity="0.4"/>
    <!-- Row 2 -->
    <text x="74" y="180" fill="#e0ebe7">Next Room</text>
    <rect x="228" y="164" width="100" height="26" rx="6" fill="#0e1f1a" stroke="#4a90e2" stroke-width="1"/>
    <text x="236" y="182" font-family="monospace" font-size="10" fill="#4a90e2">Ctrl+Alt+→</text>
    <rect x="50" y="196" width="300" height="1" fill="#1e3c34" opacity="0.4"/>
    <!-- Row 3 -->
    <text x="74" y="226" fill="#e0ebe7">Previous Room</text>
    <rect x="228" y="210" width="100" height="26" rx="6" fill="#0e1f1a" stroke="#1e3c34"/>
    <text x="236" y="228" font-family="monospace" font-size="10" fill="#4a90e2">Ctrl+Alt+←</text>
    <rect x="50" y="242" width="300" height="1" fill="#1e3c34" opacity="0.4"/>
  </g>
  <!-- Info text -->
  <text x="200" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5c7a71">Fully configurable in KDE System Settings</text>
  <!-- Apply button -->
  <rect x="148" y="296" width="104" height="30" rx="15" fill="#4a90e2" opacity="0.8"/>
  <text x="200" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="white">Apply</text>
</svg>
