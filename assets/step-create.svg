<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="640" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1f1a"/>
      <stop offset="100%" stop-color="#111f1b"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg1)"/>
  <g opacity="0.04"><pattern id="g1" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="16" cy="16" r="0.8" fill="#fff"/></pattern><rect width="640" height="360" fill="url(#g1)"/></g>
  <!-- Card outline -->
  <rect x="160" y="60" width="320" height="240" rx="20" fill="#111f1b" stroke="#1e3c34"/>
  <!-- Plus icon -->
  <circle cx="320" cy="140" r="36" fill="#4a90e2" opacity="0.1" stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="320" y1="122" x2="320" y2="158" stroke="#4a90e2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="140" x2="338" y2="140" stroke="#4a90e2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="320" y="200" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#e0ebe7">New Room</text>
  <text x="320" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5c7a71">Name · Colour · Icon</text>
  <!-- Colour chips -->
  <g transform="translate(248, 244)">
    <circle cx="0" cy="0" r="8" fill="#4a90e2"/>
    <circle cx="24" cy="0" r="8" fill="#50c878"/>
    <circle cx="48" cy="0" r="8" fill="#e27450"/>
    <circle cx="72" cy="0" r="8" fill="#c850c8"/>
    <circle cx="96" cy="0" r="8" fill="#e2c44a"/>
    <circle cx="120" cy="0" r="8" fill="#50b4c8"/>
    <circle cx="144" cy="0" r="8" fill="#4a90e2" stroke="#e0ebe7" stroke-width="2"/>
  </g>
  <!-- Step label -->
  <rect x="250" y="20" width="140" height="28" rx="14" fill="#4a90e2" opacity="0.12"/>
  <text x="320" y="39" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#4a90e2">STEP 1: CREATE</text>
</svg>
