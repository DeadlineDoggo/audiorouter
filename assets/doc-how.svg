<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" fill="none" role="img" aria-label="How SoundRoot works in four steps">
  <defs>
    <linearGradient id="dhBg" x1="0" y1="0" x2="960" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1f1a"/>
      <stop offset="100%" stop-color="#0a1714"/>
    </linearGradient>
    <linearGradient id="dhFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#50c878" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="dhGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#50c878" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#50c878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="560" fill="url(#dhBg)"/>
  <ellipse cx="480" cy="320" rx="420" ry="220" fill="url(#dhGlow)"/>
  <g opacity="0.05">
    <pattern id="dhDots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#fff"/>
    </pattern>
    <rect width="960" height="560" fill="url(#dhDots)"/>
  </g>

  <text x="40" y="48" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#50c878" letter-spacing="3">HOW IT WORKS</text>
  <text x="40" y="80" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#e2ede9">From a tray click to a fully routed setup — in four steps.</text>

  <!-- Flow line -->
  <path d="M120 280 L840 280" stroke="url(#dhFlow)" stroke-width="2" stroke-dasharray="4 6" fill="none"/>

  <!-- STEP 1 -->
  <g>
    <circle cx="160" cy="280" r="36" fill="#0a1714" stroke="#4a90e2" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="160" y="288" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#4a90e2">1</text>
    <!-- Mini scene: panel with widget icon -->
    <rect x="100" y="148" width="120" height="96" rx="14" fill="#111f1b" stroke="#1e3c34"/>
    <rect x="100" y="148" width="120" height="22" rx="14" fill="#0a1714"/>
    <circle cx="113" cy="159" r="3" fill="#4a90e2"/>
    <circle cx="125" cy="159" r="3" fill="#1e3c34"/>
    <circle cx="137" cy="159" r="3" fill="#1e3c34"/>
    <rect x="116" y="186" width="88" height="44" rx="10" fill="#0a1714" stroke="#4a90e2" stroke-opacity="0.4"/>
    <circle cx="160" cy="208" r="10" fill="#4a90e2" fill-opacity="0.18"/>
    <circle cx="160" cy="208" r="4" fill="#4a90e2"/>
    <text x="160" y="350" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#e2ede9">Open from tray</text>
    <text x="160" y="372" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">Click the SoundRoot</text>
    <text x="160" y="386" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">icon in your panel.</text>
  </g>

  <!-- STEP 2 -->
  <g>
    <circle cx="380" cy="280" r="36" fill="#0a1714" stroke="#4a90e2" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="380" y="288" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#4a90e2">2</text>
    <!-- Mini scene: new room dialog -->
    <rect x="320" y="148" width="120" height="96" rx="14" fill="#111f1b" stroke="#1e3c34"/>
    <text x="332" y="170" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#5c7a71">NEW ROOM</text>
    <rect x="332" y="178" width="96" height="14" rx="3" fill="#0a1714"/>
    <text x="338" y="189" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#9ab5ad">Gaming</text>
    <circle cx="338" cy="208" r="5" fill="#4a90e2"/>
    <circle cx="354" cy="208" r="5" fill="#50c878"/>
    <circle cx="370" cy="208" r="5" fill="#e27450"/>
    <circle cx="386" cy="208" r="5" fill="#c850c8"/>
    <rect x="332" y="222" width="44" height="14" rx="7" fill="#1e3c34"/>
    <rect x="382" y="222" width="46" height="14" rx="7" fill="#4a90e2"/>
    <text x="405" y="232" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#e2ede9">Create</text>
    <text x="380" y="350" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#e2ede9">Create a Room</text>
    <text x="380" y="372" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">Name it, pick a colour</text>
    <text x="380" y="386" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">and an icon.</text>
  </g>

  <!-- STEP 3 -->
  <g>
    <circle cx="600" cy="280" r="36" fill="#0a1714" stroke="#4a90e2" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="600" y="288" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#4a90e2">3</text>
    <!-- Mini scene: wires app -> output -->
    <rect x="540" y="148" width="120" height="96" rx="14" fill="#111f1b" stroke="#1e3c34"/>
    <rect x="552" y="166" width="40" height="20" rx="6" fill="#0a1714" stroke="#1e3c34"/>
    <circle cx="558" cy="176" r="3" fill="#4a90e2"/>
    <text x="567" y="180" font-family="'Space Grotesk', sans-serif" font-size="8" fill="#9ab5ad">App</text>
    <rect x="608" y="166" width="40" height="20" rx="6" fill="#0a1714" stroke="#1e3c34"/>
    <circle cx="614" cy="176" r="3" fill="#50c878"/>
    <text x="623" y="180" font-family="'Space Grotesk', sans-serif" font-size="8" fill="#9ab5ad">Out</text>
    <path d="M592 176 C596 176 604 176 608 176" stroke="#4a90e2" stroke-width="2" fill="none"/>
    <rect x="552" y="194" width="40" height="20" rx="6" fill="#0a1714" stroke="#1e3c34"/>
    <circle cx="558" cy="204" r="3" fill="#50c878"/>
    <text x="567" y="208" font-family="'Space Grotesk', sans-serif" font-size="8" fill="#9ab5ad">App</text>
    <rect x="608" y="194" width="40" height="20" rx="6" fill="#0a1714" stroke="#1e3c34"/>
    <circle cx="614" cy="204" r="3" fill="#4a90e2"/>
    <text x="623" y="208" font-family="'Space Grotesk', sans-serif" font-size="8" fill="#9ab5ad">Out</text>
    <path d="M592 204 C596 204 604 204 608 204" stroke="#50c878" stroke-width="2" fill="none"/>
    <rect x="552" y="222" width="96" height="12" rx="6" fill="#0a1714"/>
    <rect x="552" y="222" width="62" height="12" rx="6" fill="#4a90e2" fill-opacity="0.6"/>
    <text x="600" y="350" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#e2ede9">Wire it up</text>
    <text x="600" y="372" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">Drag apps onto outputs.</text>
    <text x="600" y="386" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">Set per-route volume.</text>
  </g>

  <!-- STEP 4 -->
  <g>
    <circle cx="820" cy="280" r="36" fill="#0a1714" stroke="#50c878" stroke-opacity="0.65" stroke-width="1.5"/>
    <text x="820" y="288" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#50c878">4</text>
    <!-- Mini scene: room switcher with shortcut chip -->
    <rect x="760" y="148" width="120" height="96" rx="14" fill="#111f1b" stroke="#1e3c34"/>
    <rect x="772" y="164" width="96" height="20" rx="6" fill="#50c878" fill-opacity="0.18" stroke="#50c878" stroke-opacity="0.4"/>
    <circle cx="782" cy="174" r="4" fill="#50c878"/>
    <text x="794" y="178" font-family="'Space Grotesk', sans-serif" font-size="9" font-weight="700" fill="#e2ede9">Gaming · active</text>
    <rect x="772" y="190" width="96" height="14" rx="5" fill="#0a1714"/>
    <text x="780" y="201" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#9ab5ad">Work</text>
    <rect x="772" y="208" width="96" height="14" rx="5" fill="#0a1714"/>
    <text x="780" y="219" font-family="'Space Grotesk', sans-serif" font-size="9" fill="#9ab5ad">Music</text>
    <rect x="772" y="226" width="44" height="12" rx="3" fill="#0a1714" stroke="#1e3c34"/>
    <text x="794" y="235" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="7" fill="#50c878">Ctrl+Alt+→</text>
    <text x="820" y="350" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#e2ede9">Switch instantly</text>
    <text x="820" y="372" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">Click a room or use a</text>
    <text x="820" y="386" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" fill="#9ab5ad">global shortcut.</text>
  </g>

  <!-- Footer caption -->
  <g>
    <line x1="40" y1="450" x2="920" y2="450" stroke="#1e3c34" stroke-opacity="0.6"/>
    <text x="40" y="478" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#9ab5ad">
      Configuration is saved to
      <tspan font-family="'IBM Plex Mono', monospace" font-size="12" fill="#4a90e2">~/.config/audiorouter/groups.json</tspan>
      — your rooms survive reboots.
    </text>
    <text x="40" y="500" font-family="'Space Grotesk', sans-serif" font-size="13" fill="#9ab5ad">
      Audio I/O runs through
      <tspan fill="#50c878" font-weight="700">PipeWire</tspan>
      via the libpulse async API, so the panel never blocks.
    </text>
    <text x="40" y="528" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#5c7a71">QML UI · C++ backend · QAbstractListModel · KDE GlobalAccel</text>
  </g>
</svg>
