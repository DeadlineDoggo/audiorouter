<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <defs>
    <linearGradient id="mn1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a90e2" stop-opacity="0.8"/><stop offset="100%" stop-color="#4a90e2" stop-opacity="0.2"/></linearGradient>
    <linearGradient id="mn2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#50c878" stop-opacity="0.8"/><stop offset="100%" stop-color="#50c878" stop-opacity="0.2"/></linearGradient>
  </defs>
  <rect width="720" height="480" fill="#0e1f1a"/>
  <!-- Scenario: 1 source to 2 sinks -->
  <text x="180" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a90e2" letter-spacing="0.12em">ONE-TO-MANY</text>
  <rect x="60" y="60" width="160" height="50" rx="10" fill="#111f1b" stroke="#1e3c34"/>
  <text x="90" y="90" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">🎵 Spotify</text>
  <circle cx="208" cy="85" r="5" fill="#4a90e2"/>
  <rect x="320" y="50" width="160" height="40" rx="8" fill="#111f1b" stroke="#1e3c34"/>
  <text x="344" y="75" font-family="sans-serif" font-size="12" fill="#e0ebe7">🎧 Headphones</text>
  <rect x="320" y="100" width="160" height="40" rx="8" fill="#111f1b" stroke="#1e3c34"/>
  <text x="344" y="125" font-family="sans-serif" font-size="12" fill="#e0ebe7">🔊 Speakers</text>
  <path d="M213 80 C265 80 275 70 315 70" stroke="url(#mn1)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M213 90 C265 90 275 120 315 120" stroke="url(#mn1)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Scenario: many sources to 1 sink -->
  <text x="180" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#50c878" letter-spacing="0.12em">MANY-TO-ONE</text>
  <rect x="60" y="210" width="160" height="40" rx="8" fill="#111f1b" stroke="#1e3c34"/>
  <text x="90" y="235" font-family="sans-serif" font-size="12" fill="#e0ebe7">🦊 Firefox</text>
  <rect x="60" y="260" width="160" height="40" rx="8" fill="#111f1b" stroke="#1e3c34"/>
  <text x="90" y="285" font-family="sans-serif" font-size="12" fill="#e0ebe7">🎮 Game</text>
  <rect x="60" y="310" width="160" height="40" rx="8" fill="#111f1b" stroke="#1e3c34"/>
  <text x="90" y="335" font-family="sans-serif" font-size="12" fill="#e0ebe7">💬 Discord</text>
  <rect x="320" y="260" width="160" height="50" rx="10" fill="#111f1b" stroke="#1e3c34"/>
  <text x="344" y="291" font-family="sans-serif" font-size="13" font-weight="600" fill="#e0ebe7">🎧 Headphones</text>
  <path d="M225 230 C270 230 280 280 315 280" stroke="url(#mn2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M225 280 C270 280 280 285 315 285" stroke="url(#mn2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M225 330 C270 330 280 290 315 290" stroke="url(#mn2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Volume sliders -->
  <text x="540" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e27450" letter-spacing="0.12em">PER-GROUP VOLUME</text>
  <g transform="translate(520, 220)">
    <text x="0" y="0" font-family="sans-serif" font-size="10" fill="#7a9990">Gaming room</text>
    <rect x="0" y="8" width="140" height="4" rx="2" fill="#1e3c34"/>
    <rect x="0" y="8" width="119" height="4" rx="2" fill="#4a90e2"/>
    <text x="148" y="14" font-family="monospace" font-size="9" fill="#4a90e2">85%</text>
    <text x="0" y="40" font-family="sans-serif" font-size="10" fill="#7a9990">Music room</text>
    <rect x="0" y="48" width="140" height="4" rx="2" fill="#1e3c34"/>
    <rect x="0" y="48" width="140" height="4" rx="2" fill="#50c878"/>
    <text x="148" y="54" font-family="monospace" font-size="9" fill="#50c878">100%</text>
    <text x="0" y="80" font-family="sans-serif" font-size="10" fill="#7a9990">Work room</text>
    <rect x="0" y="88" width="140" height="4" rx="2" fill="#1e3c34"/>
    <rect x="0" y="88" width="84" height="4" rx="2" fill="#e27450"/>
    <text x="148" y="94" font-family="monospace" font-size="9" fill="#e27450">60%</text>
  </g>
</svg>
